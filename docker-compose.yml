services:
  catalog:
    build:
      context: ./catalog
      dockerfile: Dockerfile
    container_name: catalog_service
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data

  order:
    build:
      context: ./order
      dockerfile: Dockerfile
    container_name: order_service
    ports:
      - "3002:3002"
    depends_on:
      - catalog
    environment:
      - CATALOG_SERVICE_URL=http://catalog:3001
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_service
    ports:
      - "3000:3000"
    depends_on:
      - catalog
      - order
    environment:
      - CATALOG_SERVICE_URL=http://catalog:3001
      - ORDER_SERVICE_URL=http://order:3002
      